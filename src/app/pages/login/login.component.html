<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <p class="login-brand">TravelOps</p>
      <p class="login-tagline">CRM for travel agencies</p>
    </div>

    <button
      class="login-button"
      color="primary"
      mat-flat-button
      type="button"
      [disabled]="isLoading()"
      (click)="signIn()"
    >
      @if (isLoading()) {
        <mat-spinner class="login-spinner" diameter="20" />
      } @else {
        Sign in with Google
      }
    </button>

    @if (errorMessage()) {
      <p class="login-error" role="alert">
        {{ errorMessage() }}
      </p>
    }
  </div>
</div>
