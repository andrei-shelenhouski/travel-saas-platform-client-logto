<app-page-heading
  title="Коммерческие предложения"
  [subtitle]="'Total: ' + totalElements() + ' offers'"
>
  @if (canCreateOffer()) {
    <a matButton="filled" routerLink="/app/offers/new">
      <mat-icon>add</mat-icon>
      <span>Новое КП</span>
    </a>
  }
  <mat-button-toggle-group appearance="standard" hideSingleSelectionIndicator value="table">
    <mat-button-toggle routerLink="/app/offers" value="table" (click)="setPreferredView('table')">
      <mat-icon>list</mat-icon>
    </mat-button-toggle>
    <mat-button-toggle
      routerLink="/app/offers/kanban"
      value="kanban"
      (click)="setPreferredView('kanban')"
    >
      <mat-icon>view_kanban</mat-icon>
    </mat-button-toggle>
  </mat-button-toggle-group>
</app-page-heading>

<div class="offers-list-content">
  <app-offers-list-filter-bar
    [agentOptions]="agentOptions()"
    [dateFromFilter]="dateFromFilter()"
    [dateToFilter]="dateToFilter()"
    [searchControl]="searchControl"
    [selectedAgentId]="selectedAgentId()"
    [showAgentFilter]="showAgentFilter()"
    [statusFilter]="statusFilter()"
    [statusOptions]="statusOptions"
    (agentFilterChange)="onAgentFilterChange($event)"
    (dateFromChange)="onDateFromChange($event)"
    (dateToChange)="onDateToChange($event)"
    (statusFilterChange)="onStatusFilterChange($event)"
  />

  @if (error()) {
    <p class="offers-list-error">{{ error() }}</p>
  }

  @if (loading()) {
    <div class="offers-list-empty">
      <p class="offers-list-empty-text">Загрузка предложений...</p>
      <mat-spinner aria-label="Загрузка предложений" diameter="36" />
    </div>
  } @else {
    <app-offers-table
      [offers]="offerRows()"
      [omitColumns]="['leadNumber']"
    />
  }

  @if (totalElements() > pageSize) {
    <mat-paginator
      aria-label="Пагинация предложений"
      [length]="totalElements()"
      [pageIndex]="currentPage()"
      [pageSize]="pageSize"
      [showFirstLastButtons]="true"
      (page)="onPageChange($event)"
    />
  }
</div>
