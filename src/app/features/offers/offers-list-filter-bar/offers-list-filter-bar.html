<div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5">
  <mat-form-field>
    <mat-label>Статусы</mat-label>
    <mat-select
      multiple
      [value]="statusFilter()"
      (selectionChange)="onStatusSelectionChange($event.value)"
    >
      @for (status of statusOptions(); track status.value) {
        <mat-option [value]="status.value">{{ status.label }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  @if (showAgentFilter()) {
    <mat-form-field>
      <mat-label>Агент</mat-label>
      <mat-select
        [value]="selectedAgentId()"
        (selectionChange)="onAgentSelectionChange($event.value)"
      >
        <mat-option value="">Все</mat-option>
        @for (agent of agentOptions(); track agent.id) {
          <mat-option [value]="agent.id">{{ agent.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  }

  <mat-form-field>
    <mat-label>Создано с</mat-label>
    <input
      matInput
      type="date"
      [value]="dateFromFilter()"
      (change)="onDateFromInputChange($any($event.target).value)"
    />
  </mat-form-field>

  <mat-form-field>
    <mat-label>Создано по</mat-label>
    <input
      matInput
      type="date"
      [value]="dateToFilter()"
      (change)="onDateToInputChange($any($event.target).value)"
    />
  </mat-form-field>

  <mat-form-field>
    <mat-label>Поиск</mat-label>
    <input
      matInput
      placeholder="Клиент, направление, номер КП"
      [formControl]="searchControl()"
    />
  </mat-form-field>
</div>
