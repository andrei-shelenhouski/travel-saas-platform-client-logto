<div class="space-y-4">
  <header class="flex items-center justify-between border-b border-gray-200 pb-4">
    <h1 class="text-xl font-semibold text-gray-900">Edit offer</h1>
    <a mat-button [routerLink]="['/app/offers', offer()?.id]">Cancel</a>
  </header>

  @if (loading()) {
    <div class="flex justify-center py-12">
      <div aria-hidden="true" class="h-8 w-8 animate-spin rounded-full border-2 border-primary border-t-transparent"></div>
    </div>
  } @else {
    @if (error()) {
      <p class="text-sm text-red-600">{{ error() }}</p>
    }
    <form class="max-w-xl flex flex-col gap-4" [formGroup]="form" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="w-full" subscriptSizing="dynamic">
        <mat-label>Title</mat-label>
        <input formControlName="title" id="title" matInput required type="text" />
        @if (form.controls.title.hasError('required') && form.controls.title.touched) {
          <mat-error>Required</mat-error>
        }
      </mat-form-field>
      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
        <mat-form-field appearance="outline" class="w-full" subscriptSizing="dynamic">
          <mat-label>Final price</mat-label>
          <input formControlName="finalPrice" id="finalPrice" matInput step="0.01" type="number" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="w-full" subscriptSizing="dynamic">
          <mat-label>Currency</mat-label>
          <input formControlName="currency" id="currency" matInput type="text" />
        </mat-form-field>
      </div>
      <mat-form-field appearance="outline" class="w-full" subscriptSizing="dynamic">
        <mat-label>Valid until</mat-label>
        <input formControlName="validUntil" id="validUntil" matInput type="date" />
      </mat-form-field>
      <mat-form-field appearance="outline" class="w-full" subscriptSizing="dynamic">
        <mat-label>Description</mat-label>
        <textarea formControlName="description" id="description" matInput rows="4"></textarea>
      </mat-form-field>
      <div class="flex flex-wrap gap-3">
        <button color="primary" mat-flat-button type="submit" [disabled]="saving() || form.invalid">
          @if (saving()) {
            <span aria-hidden="true" class="inline-block h-4 w-4 animate-spin rounded-full border-2 border-current border-t-transparent"></span>
          } @else {
            Save
          }
        </button>
        <a mat-button [routerLink]="['/app/offers', offer()?.id]">Cancel</a>
      </div>
    </form>
  }
</div>
