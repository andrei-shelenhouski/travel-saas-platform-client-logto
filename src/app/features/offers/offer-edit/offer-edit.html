<div class="space-y-4">
  <header class="flex items-center justify-between border-b border-gray-200 pb-4">
    <h1 class="text-xl font-semibold text-gray-900">Edit offer</h1>
    <a
      class="rounded px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100"
      [routerLink]="['/app/offers', offer()?.id]"
    >
      Cancel
    </a>
  </header>

  @if (loading()) {
    <div class="flex justify-center py-12">
      <div aria-hidden="true" class="h-8 w-8 animate-spin rounded-full border-2 border-primary border-t-transparent"></div>
    </div>
  } @else {
    @if (error()) {
      <p class="text-sm text-red-600">{{ error() }}</p>
    }
    <form class="max-w-xl space-y-4" (ngSubmit)="onSubmit()">
      <div>
        <label class="block text-sm font-medium text-gray-700" for="title">Title</label>
        <input
          class="mt-1 block w-full rounded border border-gray-300 px-3 py-2 text-sm"
          id="title"
          name="title"
          required
          type="text"
          [(ngModel)]="title"
        />
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700" for="finalPrice">Final price</label>
          <input
            class="mt-1 block w-full rounded border border-gray-300 px-3 py-2 text-sm"
            id="finalPrice"
            name="finalPrice"
            step="0.01"
            type="number"
            [(ngModel)]="finalPrice"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700" for="currency">Currency</label>
          <input
            class="mt-1 block w-full rounded border border-gray-300 px-3 py-2 text-sm"
            id="currency"
            name="currency"
            type="text"
            [(ngModel)]="currency"
          />
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700" for="validUntil">Valid until</label>
        <input
          class="mt-1 block w-full rounded border border-gray-300 px-3 py-2 text-sm"
          id="validUntil"
          name="validUntil"
          type="date"
          [(ngModel)]="validUntil"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700" for="description">Description</label>
        <textarea
          class="mt-1 block w-full rounded border border-gray-300 px-3 py-2 text-sm"
          id="description"
          name="description"
          rows="4"
          [(ngModel)]="description"
        ></textarea>
      </div>
      <div class="flex gap-3">
        <button
          class="rounded bg-primary px-4 py-2 text-sm font-medium text-primary-foreground hover:bg-primary-hover disabled:opacity-50"
          type="submit"
          [disabled]="saving()"
        >
          @if (saving()) {
            <span aria-hidden="true" class="inline-block h-4 w-4 animate-spin rounded-full border-2 border-current border-t-transparent"></span>
          } @else {
            Save
          }
        </button>
        <a
          class="rounded px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100"
          [routerLink]="['/app/offers', offer()?.id]"
        >
          Cancel
        </a>
      </div>
    </form>
  }
</div>
