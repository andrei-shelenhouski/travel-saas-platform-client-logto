<div class="mb-4">
  <a
    class="text-sm font-medium text-gray-600 hover:text-gray-900"
    routerLink="/app/leads"
  >
    ← Back to leads
  </a>
</div>
<div class="max-w-lg rounded-lg border border-gray-200 bg-white p-6 shadow-sm">
  <h1 class="text-xl font-semibold text-gray-900 mb-4">Create lead</h1>
  <form class="space-y-4" [formGroup]="form" (ngSubmit)="onSubmit()">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="source">Source</label>
      <select
        class="w-full rounded border border-gray-300 px-3 py-2 text-gray-900 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary"
        formControlName="source"
        id="source"
      >
        @for (opt of sourceOptions; track opt.value) {
          <option [value]="opt.value">{{ opt.label }}</option>
        }
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="contactName">Contact name</label>
      <input
        class="w-full rounded border border-gray-300 px-3 py-2 text-gray-900 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary"
        formControlName="contactName"
        id="contactName"
        placeholder="John Doe"
        type="text"
      />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="contactEmail">Email</label>
      <input
        class="w-full rounded border border-gray-300 px-3 py-2 text-gray-900 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary"
        formControlName="contactEmail"
        id="contactEmail"
        placeholder="john@example.com"
        type="email"
      />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="contactPhone">Phone</label>
      <input
        class="w-full rounded border border-gray-300 px-3 py-2 text-gray-900 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary"
        formControlName="contactPhone"
        id="contactPhone"
        placeholder="+1 234 567 8900"
        type="tel"
      />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="notes">Notes</label>
      <textarea
        class="w-full rounded border border-gray-300 px-3 py-2 text-gray-900 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary"
        formControlName="notes"
        id="notes"
        placeholder="Optional notes about the lead"
        rows="3"
      ></textarea>
    </div>
    @if (error()) {
      <p class="text-sm text-red-600">{{ error() }}</p>
    }
    <div class="flex gap-3 pt-2">
      <button
        class="rounded bg-primary px-4 py-2 text-sm font-medium text-primary-foreground hover:bg-primary-hover disabled:opacity-50"
        type="submit"
        [disabled]="loading() || form.invalid"
      >
        {{ loading() ? 'Creating…' : 'Create lead' }}
      </button>
      <a
        class="rounded border border-gray-300 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50"
        routerLink="/app/leads"
      >
        Cancel
      </a>
    </div>
  </form>
</div>
