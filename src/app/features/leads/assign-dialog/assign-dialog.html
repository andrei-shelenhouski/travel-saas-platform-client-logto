<h2 mat-dialog-title>Назначить лид</h2>

<mat-dialog-content>
  <div class="assign-dialog-content">
    <mat-form-field appearance="outline" class="assign-search-field">
      <mat-label>Поиск агента</mat-label>
      <input
        #assignSearchInput
        matInput
        [value]="assignSearch()"
        (input)="updateAssignSearch(assignSearchInput.value)"
      />
    </mat-form-field>

    <div aria-label="Агенты" class="assign-agent-list" role="listbox">
      @for (agent of filteredAgents(); track agent.id) {
        <button
          class="assign-agent-item"
          type="button"
          [class.assign-agent-item-active]="isSelectedAgent(agent.userId)"
          (click)="selectAgent(agent.userId)"
        >
          <span class="agent-avatar">{{ getAgentInitials(agent.name) }}</span>
          <span class="assign-agent-text">
            <span>{{ agent.name }}</span>
            <span class="assign-agent-email">{{ agent.email }}</span>
          </span>
        </button>
      } @empty {
        <p class="assign-empty-message">Активные агенты не найдены.</p>
      }
    </div>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="onCancel()">Отмена</button>
  <button
    color="primary"
    mat-flat-button
    type="button"
    [disabled]="!selectedAgentId()"
    (click)="onConfirm()"
  >
    Назначить
  </button>
</mat-dialog-actions>
