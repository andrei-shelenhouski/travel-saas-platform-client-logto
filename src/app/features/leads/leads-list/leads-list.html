<app-page-heading title="Лиды" [subtitle]="'Всего: ' + totalElements() + ' лидов'">
  @if (canCreateLead()) {
    <a appPageAction icon="add" label="Новый лид" matButton="filled" routerLink="/app/leads/new">
      <mat-icon>add</mat-icon>
      <span>Новый лид</span>
    </a>
  }

  @if (canDeleteLead()) {
    <div class="leads-list-toolbar">
      <button
        appPageAction
        label="Показать / скрыть удалённые"
        mat-stroked-button
        type="button"
        [class.leads-list-deleted-active]="includeDeleted()"
        [icon]="includeDeleted() ? 'visibility_off' : 'visibility'"
        (click)="toggleIncludeDeleted()"
      >
        <mat-icon>{{ includeDeleted() ? 'visibility_off' : 'visibility' }}</mat-icon>
        Показать удалённые
      </button>
    </div>
  }

  <mat-button-toggle-group appearance="standard" hideSingleSelectionIndicator value="table">
    <mat-button-toggle
      routerLink="/app/leads"
      value="table"
      (click)="setPreferredView('table')"
      (keydown.enter)="setPreferredView('table')"
    >
      <mat-icon>list</mat-icon>
    </mat-button-toggle>
    <mat-button-toggle
      routerLink="/app/leads/kanban"
      value="kanban"
      (click)="setPreferredView('kanban')"
      (keydown.enter)="setPreferredView('kanban')"
    >
      <mat-icon>view_kanban</mat-icon>
    </mat-button-toggle>
  </mat-button-toggle-group>
</app-page-heading>

<div class="leads-list-body">
  <app-leads-list-filter-bar
    [agentOptions]="agentOptions()"
    [clientTypeFilter]="clientTypeFilter()"
    [clientTypeOptions]="clientTypeOptions"
    [dateFromFilter]="dateFromFilter()"
    [dateToFilter]="dateToFilter()"
    [searchControl]="searchControl"
    [selectedAgentId]="selectedAgentId()"
    [showAgentFilter]="showAgentFilter()"
    [sourceFilter]="sourceFilter()"
    [sourceOptions]="sourceOptions"
    [statusFilter]="statusFilter()"
    [statusOptions]="statusOptions"
    (agentFilterChange)="onAgentFilterChange($event)"
    (clientTypeFilterChange)="onClientTypeFilterChange($event)"
    (dateFromChange)="onDateFromChange($event)"
    (dateToChange)="onDateToChange($event)"
    (sourceFilterChange)="onSourceFilterChange($event)"
    (statusFilterChange)="onStatusFilterChange($event)"
  />

  @if (error()) {
    <p class="leads-list-error">{{ error() }}</p>
  }

  @if (loading()) {
    <div class="table-loading-state">
      <p class="table-empty-loading-text">Загрузка лидов...</p>
      <mat-spinner aria-label="Загрузка лидов" class="table-spinner" diameter="36" />
    </div>
  } @else if (leads().length === 0) {
    <div class="table-empty-state">
      <p>Упс, лиды не найдены. Попробуйте изменить фильтры.</p>

      <span class="or-divider">или</span>

      <div>
        <a matButton="filled" routerLink="/app/leads/new">
          <mat-icon>add</mat-icon>
          <span>Добавьте нового лида</span>
        </a>
      </div>
    </div>
  } @else {
    <app-leads-table [leads]="leads()" (leadDeleted)="onLeadDeleted()" />
  }

  <mat-paginator
    aria-label="Пагинация лидов"
    [length]="totalElements()"
    [pageIndex]="currentPage()"
    [pageSize]="pageSize"
    [showFirstLastButtons]="true"
    (page)="onPageChange($event)"
  />
</div>
