<h2 mat-dialog-title>Удалить заявку?</h2>

<mat-dialog-content>
  <p class="dialog-body-text">
    Заявка <strong>{{ data.leadNumber }}</strong> будет удалена. Это действие нельзя отменить.
  </p>

  @if (data.hasOffers) {
    <div class="dialog-warning-block">
      <mat-icon class="dialog-warning-icon">warning</mat-icon>
      <p class="dialog-warning-text">
        У заявки есть связанные предложения — они тоже будут удалены.
      </p>
    </div>
  }

  @if (error()) {
    <div class="dialog-error-block">
      <p class="dialog-error-text">{{ error() }}</p>
    </div>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button type="button" [disabled]="deleting()" (click)="onCancel()">
    Отмена
  </button>
  <button color="warn" mat-flat-button type="button" [disabled]="deleting()" (click)="onConfirm()">
    @if (deleting()) {
      <mat-spinner diameter="16" />
    }
    Удалить заявку
  </button>
</mat-dialog-actions>
