<section class="offers-card">
  <div class="offers-card-header">
    <h2 class="offers-card-title">Предложения</h2>
    @if (canCreateOffer()) {
      <button color="primary" mat-flat-button type="button" (click)="createOfferClicked.emit()">
        <mat-icon>add</mat-icon>
        Создать предложение
      </button>
    }
  </div>

  <app-offers-table
    [offers]="offerRows()"
    [omitColumns]="['leadNumber', 'updatedAt']"
  />
</section>
