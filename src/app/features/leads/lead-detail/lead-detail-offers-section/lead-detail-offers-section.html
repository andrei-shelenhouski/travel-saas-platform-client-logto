<section class="offers-card">
  <div class="offers-card-header">
    <h2 class="offers-card-title">Предложения</h2>
    @if (canCreateOffer()) {
      <button color="primary" mat-flat-button type="button" (click)="createOfferClicked.emit()">
        <mat-icon>add</mat-icon>
        Создать предложение
      </button>
    }
  </div>

  <div class="table-wrap">
    <table mat-table [dataSource]="offers()">
      <ng-container matColumnDef="number">
        <th *matHeaderCellDef mat-header-cell>Номер</th>
        <td *matCellDef="let row" mat-cell>
          <span class="cell-primary">{{ row.number ?? '—' }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="destination">
        <th *matHeaderCellDef mat-header-cell>Направление</th>
        <td *matCellDef="let row" mat-cell>
          {{ row.destination ?? '—' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th *matHeaderCellDef mat-header-cell>Статус</th>
        <td *matCellDef="let row" mat-cell>
          <app-offer-status-chip [status]="row.status" />
        </td>
      </ng-container>

      <ng-container matColumnDef="total">
        <th *matHeaderCellDef mat-header-cell>Сумма</th>
        <td *matCellDef="let row" mat-cell>
          @if (row.total) {
            {{ row.total | number: '1.2-2' }} {{ row.currency }}
          } @else {
            —
          }
        </td>
      </ng-container>

      <tr *matHeaderRowDef="columns" class="table-header-row" mat-header-row></tr>
      <tr
        *matRowDef="let row; columns: columns"
        class="table-row"
        mat-row
        [routerLink]="['/app/offers', row.id]"
      ></tr>
      <tr *matNoDataRow>
        <td [attr.colspan]="columns.length">
          <div class="table-empty-state">
            <p>Предложений пока нет.</p>
          </div>
        </td>
      </tr>
    </table>
  </div>
</section>
