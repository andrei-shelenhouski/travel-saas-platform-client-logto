<app-page-heading subtitle="Всего: {{ totalElements() }} туристов" title="Туристы">
  @if (canCreate()) {
    <button
      appPageAction
      color="primary"
      icon="add"
      label="Создать туриста"
      mat-flat-button
      type="button"
      (click)="openCreateDialog()"
    >
      <mat-icon>add</mat-icon>
      <span>Создать туриста</span>
    </button>
  }
</app-page-heading>

<div class="persons-list-body">
  <mat-form-field class="search-field" subscriptSizing="dynamic">
    <mat-label>Поиск</mat-label>
    <input
      matInput
      placeholder="Поиск по имени, телефону, номеру паспорта…"
      [formControl]="searchControl"
    />
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <div class="filter-bar">
    <mat-form-field subscriptSizing="dynamic">
      <mat-label>Тип</mat-label>
      <mat-select [value]="typeFilter() ?? ''" (valueChange)="onTypeFilterChange($event)">
        <mat-option value="">Все</mat-option>
        <mat-option value="CLIENT">Только клиенты</mat-option>
        <mat-option value="DEPENDANT">Только иждивенцы</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field subscriptSizing="dynamic">
      <mat-label>Документы</mat-label>
      <mat-select [value]="docStatusFilter() ?? ''" (valueChange)="onDocStatusFilterChange($event)">
        <mat-option value="">Все</mat-option>
        <mat-option value="EXPIRING">Истекают скоро</mat-option>
        <mat-option value="EXPIRED">Просрочены</mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  @if (activeChips().length > 0) {
    <mat-chip-set aria-label="Активные фильтры" class="chips-row">
      @for (chip of activeChips(); track chip.label) {
        <mat-chip (removed)="chip.clear()">
          {{ chip.label }}
          <button aria-label="Убрать фильтр" matChipRemove type="button">
            <mat-icon>cancel</mat-icon>
          </button>
        </mat-chip>
      }
    </mat-chip-set>
  }

  @if (error()) {
    <p class="persons-list-error" role="alert">{{ error() }}</p>
  }

  <app-persons-table
    [emptyMessage]="
      hasActiveFilters() ? 'Ничего не найдено по заданным фильтрам.' : 'Туристы ещё не добавлены.'
    "
    [loading]="loading()"
    [omitColumns]="['relation']"
    [persons]="personRows()"
    [showClearFiltersAction]="hasActiveFilters()"
    [showClientsLink]="!hasActiveFilters()"
    (clearFiltersRequest)="clearAllFilters()"
  />

  <mat-paginator
    aria-label="Пагинация туристов"
    [length]="totalElements()"
    [pageIndex]="currentPage()"
    [pageSize]="pageSize"
    [showFirstLastButtons]="true"
    (page)="onPageChange($event)"
  />
</div>
