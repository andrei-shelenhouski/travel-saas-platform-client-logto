<div class="space-y-4">
  @if (loading()) {
    <div class="flex justify-center py-12">
      <div
        aria-hidden="true"
        class="h-8 w-8 animate-spin rounded-full border-2 border-primary border-t-transparent"
      ></div>
    </div>
  } @else if (loadError()) {
    <section class="rounded-lg border border-red-200 bg-red-50 p-6 text-center">
      <p class="text-base font-semibold text-red-800">Бронирование не найдено</p>
      <p class="mt-1 text-sm text-red-600">
        Проверьте адрес или вернитесь к списку бронирований.
      </p>
    </section>
  } @else {
    @let b = booking();
    @if (b) {
      <app-booking-header
        [actionLoading]="actionLoading()"
        [booking]="b"
        (cancelBooking)="onCancelBooking()"
        (confirmBooking)="onConfirmBooking()"
      />

      <div class="grid gap-4 lg:grid-cols-3">
        <!-- Left column: main content -->
        <div class="space-y-4 lg:col-span-2">
          <app-client-snapshot-card
            [clientId]="b.clientId"
            [snapshot]="b.clientSnapshot"
          />

          <app-travel-details-section
            [booking]="b"
            [saving]="savingTravel()"
            (save)="onSaveTravelDetails($event)"
          />

          <app-accommodation-table [accommodationDetails]="b.accommodationDetails" />

          <app-operations-section
            [booking]="b"
            [saving]="savingOps()"
            (save)="onSaveOperations($event)"
          />
        </div>

        <!-- Right column: invoices + documents -->
        <div class="space-y-4 lg:col-span-1">
          <app-invoice-list-mini [booking]="b" [invoices]="invoices()" />

          <app-document-list
            [documents]="documents()"
            [uploading]="uploading()"
            (deleteDocument)="onDeleteDocument($event)"
            (uploadFiles)="onUploadFiles($event)"
          />
        </div>
      </div>
    } @else {
      <section class="rounded-lg border border-gray-200 bg-white p-6 text-center">
        <p class="text-gray-500">Бронирование не найдено</p>
      </section>
    }
  }
</div>

@if (cancellationDialogOpen()) {
  <app-cancellation-dialog
    (cancelled)="onCancellationCancelled()"
    (confirmed)="onCancellationConfirmed($event)"
  />
}
