<div
  aria-labelledby="cancel-dialog-title"
  aria-modal="true"
  class="cancellation-dialog-overlay"
  role="dialog"
>
  <div class="cancellation-dialog-panel">
    <h2 class="cancellation-dialog-title" id="cancel-dialog-title">
      Отмена бронирования
    </h2>

    <form class="cancellation-dialog-form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <mat-form-field>
        <mat-label>Причина отмены</mat-label>
        <textarea
          cdkAutosizeMaxRows="6"
          cdkAutosizeMinRows="3"
          formControlName="reason"
          matInput
          placeholder="Укажите причину отмены..."
        ></textarea>
        @if (form.controls.reason.hasError('required')) {
          <mat-error>Причина отмены обязательна</mat-error>
        }
      </mat-form-field>

      <div class="cancellation-dialog-actions">
        <button mat-button type="button" (click)="cancelled.emit()">Отмена</button>
        <button color="warn" mat-flat-button type="submit" [disabled]="form.invalid">
          <span>Подтвердить</span>
        </button>
      </div>
    </form>
  </div>
</div>
