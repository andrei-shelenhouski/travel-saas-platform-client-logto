<div class="document-row">
  <div class="document-row-info">
    <mat-icon class="document-row-icon">insert_drive_file</mat-icon>
    <div class="document-row-details">
      <p class="document-row-name">
        {{ document().filename || 'Документ' }}
      </p>
      @if (document().uploadedAt) {
        <p class="document-row-meta">
          {{ document().uploadedAt | date: 'medium' }}
          @if (document().uploadedByName) {
            &middot; {{ document().uploadedByName }}
          }
        </p>
      }
    </div>
  </div>

  <button
    aria-label="Удалить документ"
    color="warn"
    mat-icon-button
    type="button"
    (click)="delete.emit(document())"
  >
    <mat-icon>delete</mat-icon>
  </button>
</div>
