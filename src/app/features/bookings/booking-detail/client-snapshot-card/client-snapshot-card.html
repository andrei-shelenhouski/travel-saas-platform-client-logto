<section class="rounded-lg border border-gray-200 bg-white p-4">
  <div class="flex items-center justify-between">
    <h2 class="text-sm font-semibold text-gray-900" i18n>Client</h2>
    @if (clientId()) {
      <a
        class="flex items-center gap-1 text-xs text-primary hover:underline"
        [routerLink]="['/app/clients', clientId()]"
      >
        <mat-icon class="text-sm!">open_in_new</mat-icon>
        <span i18n>Open profile</span>
      </a>
    }
  </div>

  <dl class="mt-3 grid gap-2 text-sm sm:grid-cols-2">
    <div>
      <dt class="text-gray-500" i18n>Name</dt>
      <dd class="font-medium text-gray-900">{{ name() }}</dd>
    </div>
    @if (clientType()) {
      <div>
        <dt class="text-gray-500" i18n>Client type</dt>
        <dd class="font-medium text-gray-900">{{ clientType() }}</dd>
      </div>
    }
    @if (phone()) {
      <div>
        <dt class="text-gray-500" i18n>Phone</dt>
        <dd class="font-medium text-gray-900">
          <a class="hover:underline" [href]="'tel:' + phone()">{{ phone() }}</a>
        </dd>
      </div>
    }
    @if (email()) {
      <div>
        <dt class="text-gray-500">Email</dt>
        <dd class="font-medium text-gray-900">
          <a class="hover:underline" [href]="'mailto:' + email()">{{ email() }}</a>
        </dd>
      </div>
    }
  </dl>
</section>
