<section class="snapshot-card">
  <div class="snapshot-header">
    <h2 class="snapshot-title">Клиент</h2>
    @if (clientId()) {
      <a
        class="snapshot-profile-link"
        [routerLink]="['/app/clients', clientId()]"
      >
        <mat-icon class="snapshot-profile-icon">open_in_new</mat-icon>
        <span>Открыть профиль</span>
      </a>
    }
  </div>

  <dl class="snapshot-data-grid">
    <div>
      <dt class="snapshot-label">Имя</dt>
      <dd class="snapshot-value">{{ name() }}</dd>
    </div>
    @if (clientType()) {
      <div>
        <dt class="snapshot-label">Тип клиента</dt>
        <dd class="snapshot-value">{{ clientType() }}</dd>
      </div>
    }
    @if (phone()) {
      <div>
        <dt class="snapshot-label">Телефон</dt>
        <dd class="snapshot-value">
          <a class="snapshot-contact-link" [href]="'tel:' + phone()">{{ phone() }}</a>
        </dd>
      </div>
    }
    @if (email()) {
      <div>
        <dt class="snapshot-label">Email</dt>
        <dd class="snapshot-value">
          <a class="snapshot-contact-link" [href]="'mailto:' + email()">{{ email() }}</a>
        </dd>
      </div>
    }
  </dl>
</section>
