<section class="rounded-lg border border-gray-200 bg-white p-4">
  <div class="flex items-center justify-between">
    <h2 class="text-sm font-semibold text-gray-900" i18n>Documents</h2>
    <button mat-stroked-button type="button" [disabled]="uploading()" (click)="triggerUpload()">
      <mat-icon>upload</mat-icon>
      <span i18n>Upload</span>
    </button>
  </div>

  <input
    #fileInput
    accept="*/*"
    class="hidden"
    multiple
    type="file"
    (change)="onFileSelected($event)"
  />

  <div class="mt-3 space-y-2">
    @for (doc of documents(); track doc.id) {
      <app-document-row [document]="doc" (delete)="onDeleteRequest($event)" />
    } @empty {
      <p class="text-sm text-gray-500" i18n>No documents uploaded</p>
    }
  </div>
</section>

<app-confirmation-dialog
  cancelLabel="Cancel"
  i18n-cancelLabel
  confirmLabel="Delete"
  i18n-confirmLabel
  title="Delete document"
  i18n-title
  [danger]="true"
  [message]="deleteConfirmMessage()"
  [open]="deleteDialogOpen()"
  (cancel)="onDeleteCancel()"
  (confirm)="onDeleteConfirm()"
/>
