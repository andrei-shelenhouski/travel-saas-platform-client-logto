<section class="document-list-card">
  <div class="document-list-header">
    <h2 class="document-list-title">Документы</h2>
    <button mat-stroked-button type="button" [disabled]="uploading()" (click)="triggerUpload()">
      <mat-icon>upload</mat-icon>
      <span>Загрузить</span>
    </button>
  </div>

  <input
    #fileInput
    accept="*/*"
    class="document-list-input-hidden"
    multiple
    type="file"
    (change)="onFileSelected($event)"
  />

  <div class="document-list-items">
    @for (doc of documents(); track doc.id) {
      <app-document-row [document]="doc" (delete)="onDeleteRequest($event)" />
    } @empty {
      <p class="document-list-empty">Документы не загружены</p>
    }
  </div>
</section>
