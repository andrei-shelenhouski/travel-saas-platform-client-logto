<app-page-heading subtitle="Всего: {{ totalElements() }} бронирований" title="Бронирования">
  @if (showCreateBookingButton()) {
    <button appPageAction color="primary" icon="add" label="Создать бронирование" mat-flat-button type="button" (click)="navigateToCreateBooking()">
      <mat-icon>add</mat-icon>
      <span>Новое бронирование</span>
    </button>
  }
</app-page-heading>

<div class="bookings-list-body">
  <app-booking-filter-bar
    [staffOptions]="staffOptions()"
    [value]="filterValue()"
    (filterChange)="onFilterChange($event)"
  />

  @if (error()) {
    <p class="bookings-list-error" role="alert">{{ error() }}</p>
  }

  <app-bookings-table
    [bookings]="bookingRows()"
    [loading]="loading()"
    [omitColumns]="omitColumns"
  />

  @if (totalElements() > pageSize) {
    <mat-paginator
      aria-label="Пагинация бронирований"
      [length]="totalElements()"
      [pageIndex]="currentPage()"
      [pageSize]="pageSize"
      [showFirstLastButtons]="true"
      (page)="onPageChange($event)"
    />
  }
</div>
