  <table mat-table [dataSource]="rows()">
    <ng-container matColumnDef="number">
      <th *matHeaderCellDef mat-header-cell>Бронирование</th>
      <td *matCellDef="let booking" class="cell-primary" mat-cell>
        {{ booking.number || booking.id }}
      </td>
    </ng-container>

    <ng-container matColumnDef="destination">
      <th *matHeaderCellDef mat-header-cell>Направление</th>
      <td *matCellDef="let booking" mat-cell>{{ booking.destination || '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="travelPeriod">
      <th *matHeaderCellDef mat-header-cell>Даты</th>
      <td *matCellDef="let booking" mat-cell>
        {{ formatDate(booking.departDate) }} - {{ formatDate(booking.returnDate) }}
      </td>
    </ng-container>

    <ng-container matColumnDef="travelerRole">
      <th *matHeaderCellDef mat-header-cell>Роль</th>
      <td *matCellDef="let booking" mat-cell>{{ booking.travelerRole || '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th *matHeaderCellDef mat-header-cell>Статус</th>
      <td *matCellDef="let booking" mat-cell>
        <app-booking-status-chip [status]="booking.status" />
      </td>
    </ng-container>

    <tr *matHeaderRowDef="displayedColumns()" class="table-header-row" mat-header-row></tr>
    <tr
      *matRowDef="let row; columns: displayedColumns()"
      class="table-row"
      mat-row
      tabindex="0"
      (click)="rowClick.emit(row.id)"
      (keydown.enter)="rowClick.emit(row.id)"
    ></tr>
    <tr *matNoDataRow>
      <td [attr.colspan]="displayedColumns().length">
        <div class="table-empty-state">
          @if (loading()) {
            <p class="table-empty-state-message">Загрузка...</p>
            <mat-spinner aria-label="Загрузка" diameter="36" />
          } @else {
            <p>Нет данных</p>
          }
        </div>
      </td>
    </tr>
  </table>
