<section class="client-card">
  <div class="client-card-header">
    <h2 class="client-card-title">Договоры</h2>
    @if (canCreateContracts()) {
      <button matButton="filled" type="button" (click)="openCreateContractDialog()">
        <span>Добавить договор</span>
      </button>
    }
  </div>

  @if (loading() && contracts().length === 0) {
    <div class="history-section-loading">
      <mat-spinner aria-label="Загрузка договоров..." diameter="36" />
    </div>
  } @else if (!loading() && contracts().length === 0) {
    <div class="history-section-empty">
      <p>Договоры ещё не добавлены</p>
      @if (canCreateContracts()) {
        <button mat-stroked-button type="button" (click)="openCreateContractDialog()">
          <span>Добавить договор</span>
        </button>
      }
    </div>
  } @else {
    <app-contracts-table
      [canManageRow]="canManageContract"
      [contracts]="contracts()"
      [loading]="loading()"
      [navigateToDetail]="false"
      [omitColumns]="omitColumns"
      (editContract)="openEditContractDialog($event)"
      (terminateContract)="terminateContract($event)"
    />

    @if (contractsTotal() > contractsPageSize) {
      <mat-paginator
        class="contracts-paginator"
        [length]="contractsTotal()"
        [pageIndex]="contractsPageIndex()"
        [pageSize]="contractsPageSize"
        [showFirstLastButtons]="true"
        (page)="onContractsPageChange($event)"
      />
    }
  }
</section>
