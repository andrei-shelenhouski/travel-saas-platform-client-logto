<section class="client-card">
  <div class="client-card-header">
    <h2 class="client-card-title">Бронирования</h2>
  </div>

  @if (loading() && bookingRows().length === 0) {
    <div class="history-section-loading">
      <mat-spinner aria-label="Загрузка бронирований..." diameter="36" />
    </div>
  } @else if (!loading() && bookingRows().length === 0) {
    <div class="history-section-empty">
      <p>Нет бронирований</p>
    </div>
  } @else {
    <app-bookings-table
      [bookings]="bookingRows()"
      [loading]="loading()"
      [omitColumns]="omitColumns"
    />
  }
</section>
