<section class="client-card">
  <div class="client-card-header">
    <h2 class="client-card-title">Члены семьи</h2>
    <button mat-stroked-button type="button" (click)="openAddDialog()">
      <mat-icon>add</mat-icon>
      Добавить
    </button>
  </div>

  @if (loading()) {
    <div class="family-loading">
      <mat-spinner aria-label="Загрузка членов семьи..." diameter="36" />
    </div>
  } @else if (personRows().length === 0) {
    <p class="family-empty">Связи пока не добавлены</p>
  } @else {
    <app-persons-table
      emptyMessage="Связи пока не добавлены"
      [omitColumns]="['type', 'documents', 'actions']"
      [persons]="personRows()"
    />
  }
</section>
