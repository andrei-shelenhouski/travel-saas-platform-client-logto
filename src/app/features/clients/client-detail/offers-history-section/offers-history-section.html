<section class="client-card">
  <div class="client-card-header">
    <h2 class="client-card-title">Предложения</h2>
  </div>

  @if (loading()) {
    <div class="history-section-loading">
      <mat-spinner aria-label="Загрузка предложений..." diameter="36" />
    </div>
  } @else if (offerRows().length === 0) {
    <div class="history-section-empty">
      <p>Нет предложений</p>
    </div>
  } @else {
    <app-offers-table
      [offers]="offerRows()"
      [omitColumns]="['leadNumber', 'updatedAt']"
    />
  }
</section>
