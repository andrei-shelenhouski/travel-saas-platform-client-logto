<app-page-heading subtitle="Всего: {{ totalElements() }} клиентов" title="Клиенты">
  <button appPageAction color="primary" icon="add" label="Создать клиента" mat-flat-button type="button" (click)="navigateToCreateClient()">
    <mat-icon>add</mat-icon>
    <span>Новый клиент</span>
  </button>
</app-page-heading>

<div class="clients-list-body">
  <app-client-filter-bar (filterChange)="onFilterChange($event)" />

  @if (error()) {
    <p class="clients-list-error" role="alert">{{ error() }}</p>
  }

  <app-clients-table [clients]="clients()" [loading]="loading()" />

  <mat-paginator
    aria-label="Пагинация клиентов"
    [length]="totalElements()"
    [pageIndex]="currentPage()"
    [pageSize]="pageSize"
    [showFirstLastButtons]="true"
    (page)="onPageChange($event)"
  />
</div>
