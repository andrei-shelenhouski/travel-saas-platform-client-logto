<h2 mat-dialog-title>
  @if (mode === 'edit') {
    <span>Редактировать договор</span>
  } @else {
    <span>Добавить договор</span>
  }
</h2>

<mat-dialog-content>
  <app-contract-form
    [clientId]="clientId"
    [initialContract]="initialContract"
    [mode]="mode"
    [saving]="saving()"
    [submitError]="submitError()"
    (cancelled)="close()"
    (createSubmitted)="onCreateSubmitted($event)"
    (updateSubmitted)="onUpdateSubmitted($event)"
  />
</mat-dialog-content>
