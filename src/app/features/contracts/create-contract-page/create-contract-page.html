<app-page-heading
  subtitle="Заполните реквизиты и параметры подписания"
  [showBackButton]="true"
  title="Создать договор"
/>

<section class="contract-create-shell">
  <div class="contract-create-card">
    <p class="contract-create-note">
      Договор будет доступен в карточке клиента сразу после создания.
    </p>

    <app-contract-form
      [allowClientIdEdit]="true"
      [clientId]="initialClientId()"
      [mode]="'create'"
      [saving]="saving()"
      [submitError]="submitError()"
      (cancelled)="cancel()"
      (createSubmitted)="onCreateSubmitted($event)"
    />
  </div>
</section>
