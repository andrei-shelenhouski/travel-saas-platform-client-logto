<app-page-heading title="Создать договор" />

<section class="contract-create-shell">
  <app-contract-form
    [allowClientIdEdit]="true"
    [clientId]="initialClientId()"
    [mode]="'create'"
    [saving]="saving()"
    [submitError]="submitError()"
    (cancelled)="cancel()"
    (createSubmitted)="onCreateSubmitted($event)"
  />
</section>
