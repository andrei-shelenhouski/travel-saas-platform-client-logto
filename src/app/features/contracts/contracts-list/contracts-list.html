<app-page-heading subtitle="Всего: {{ totalElements() }}" title="Договоры">
  @if (canCreateContracts()) {
    <button appPageAction icon="add" label="Создать договор" matButton="filled" type="button" (click)="goToCreateContract()">
      <span>Создать договор</span>
    </button>
  }
</app-page-heading>

<div class="contracts-list-content">
  <app-contracts-filter-bar
    [value]="activeFilter()"
    (filterChange)="onFilterChange($event)"
  />

  @if (error()) {
    <p class="contracts-list-error" role="alert">{{ error() }}</p>
  }

  <app-contracts-table
    [canManageRow]="canManageContract"
    [contracts]="contracts()"
    [loading]="loading()"
    [navigateToDetail]="true"
    (editContract)="goToEditContract($event)"
    (terminateContract)="terminateContract($event)"
  />

  @if (totalElements() > pageSize) {
    <mat-paginator
      aria-label="Пагинация договоров"
      [length]="totalElements()"
      [pageIndex]="currentPage()"
      [pageSize]="pageSize"
      [showFirstLastButtons]="true"
      (page)="onPageChange($event)"
    />
  }
</div>
