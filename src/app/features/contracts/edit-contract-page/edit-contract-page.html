<app-page-heading title="Редактировать договор" />

<section class="contract-edit-shell">
  @if (loading()) {
    <p>Загрузка договора...</p>
  } @else if (contract()) {
    <app-contract-form
      [initialContract]="contract()"
      [mode]="'edit'"
      [saving]="saving()"
      [submitError]="submitError()"
      (cancelled)="cancel()"
      (updateSubmitted)="onUpdateSubmitted($event)"
    />
  }
</section>
