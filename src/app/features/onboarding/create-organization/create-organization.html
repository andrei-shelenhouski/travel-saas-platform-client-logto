<div class="min-h-screen flex items-center justify-center bg-gray-50 p-4">
  <div class="w-full max-w-sm rounded-lg border border-gray-200 bg-white p-6 shadow-sm">
    @if (fromApp) {
      <a class="mb-4 inline-flex items-center gap-1.5" mat-button routerLink="/app/dashboard">
        <span aria-hidden="true" class="material-icons text-base">arrow_back</span>
        <span>Back to dashboard</span>
      </a>
    }
    <h1 class="text-xl font-semibold text-gray-900 mb-4">Create organization</h1>
    <form class="flex flex-col gap-4" [formGroup]="form" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="w-full" subscriptSizing="dynamic">
        <mat-label>Organization name</mat-label>
        <input formControlName="name" id="name" matInput placeholder="Acme Tours" type="text" />
        @if (form.controls.name.hasError('required') && form.controls.name.touched) {
          <mat-error>Required</mat-error>
        }
      </mat-form-field>
      @if (error()) {
        <p class="text-sm text-red-600">{{ error() }}</p>
      }
      <button
        class="w-full"
        color="primary"
        mat-flat-button
        type="submit"
        [disabled]="loading() || form.invalid"
      >
        {{ loading() ? 'Creating...' : 'Create' }}
      </button>
    </form>
  </div>
</div>
