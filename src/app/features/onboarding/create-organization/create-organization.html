<div class="create-org-page">
  <div class="create-org-card">
    @if (fromApp) {
      <a class="create-org-back-link" mat-button routerLink="/app/dashboard">
        <span aria-hidden="true" class="material-icons create-org-back-icon">arrow_back</span>
        <span>Назад на панель управления</span>
      </a>
    }
    <h1 class="create-org-title">Создать организацию</h1>
    <form class="create-org-form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="create-org-field" subscriptSizing="dynamic">
        <mat-label>Название организации</mat-label>
        <input formControlName="name" id="name" matInput placeholder="Acme Tours" type="text" />
        @if (form.controls.name.hasError('required') && form.controls.name.touched) {
          <mat-error>Обязательное поле</mat-error>
        }
      </mat-form-field>
      @if (error()) {
        <p class="create-org-error">{{ error() }}</p>
      }
      <button
        class="create-org-submit"
        color="primary"
        mat-flat-button
        type="submit"
        [disabled]="loading() || form.invalid"
      >
        {{ loading() ? 'Создание...' : 'Создать' }}
      </button>
    </form>
  </div>
</div>
