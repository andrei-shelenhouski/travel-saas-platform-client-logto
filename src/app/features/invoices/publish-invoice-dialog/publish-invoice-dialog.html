<h2 i18n="@@publishInvoiceDialogTitle" mat-dialog-title>
  Publish invoice {{ data.invoiceNumber }}?
</h2>

<mat-dialog-content>
  <p i18n="@@publishInvoiceDialogBody">
    After publishing, the invoice cannot be edited. Client and issuer details will be locked.
  </p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button
    i18n="@@publishInvoiceDialogBtnPreview"
    mat-stroked-button
    type="button"
    (click)="previewPdf()"
  >
    <mat-icon>preview</mat-icon>
    Preview
  </button>
  <button
    i18n="@@publishInvoiceDialogBtnCancel"
    mat-button
    type="button"
    [disabled]="loading()"
    (click)="cancel()"
  >
    Cancel
  </button>
  <button
    color="primary"
    i18n="@@publishInvoiceDialogBtnConfirm"
    mat-flat-button
    type="button"
    [disabled]="loading()"
    (click)="confirm()"
  >
    @if (loading()) {
      <mat-spinner diameter="20"></mat-spinner>
    } @else {
      <mat-icon>publish</mat-icon>
    }
    Publish
  </button>
</mat-dialog-actions>
