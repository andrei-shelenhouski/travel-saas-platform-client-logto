<div class="grid gap-3 md:grid-cols-3">
  <button
    aria-label="Filter by draft invoices"
    i18n-aria-label="@@invoiceSummaryDraftAriaLabel"
    type="button"
    [class]="cardClass('draft', isDraftActive())"
    (click)="onDraftClick()"
  >
    <span class="summary-card__title" i18n="@@invoiceSummaryDraftTitle">Drafts</span>
    <span class="summary-card__value" i18n="@@invoiceSummaryDraftValue"
      >Drafts: {{ drafts() }}</span
    >
  </button>

  <button
    aria-label="Filter by pending invoices"
    i18n-aria-label="@@invoiceSummaryPendingAriaLabel"
    type="button"
    [class]="cardClass('pending', isPendingActive())"
    (click)="onPendingClick()"
  >
    <span class="summary-card__title" i18n="@@invoiceSummaryPendingTitle">Pending payment</span>
    <span class="summary-card__value" i18n="@@invoiceSummaryPendingValue"
      >Pending payment: {{ pendingCount() }} / Amount: {{ formatAmount(pendingAmount()) }}
      {{ currency() }}</span
    >
  </button>

  <button
    aria-label="Filter by overdue invoices"
    i18n-aria-label="@@invoiceSummaryOverdueAriaLabel"
    type="button"
    [class]="cardClass('overdue', isOverdueActive())"
    (click)="onOverdueClick()"
  >
    <span class="summary-card__title" i18n="@@invoiceSummaryOverdueTitle">Overdue</span>
    <span class="summary-card__value" i18n="@@invoiceSummaryOverdueValue"
      >Overdue: {{ overdueCount() }} / Amount: {{ formatAmount(overdueAmount()) }}
      {{ currency() }}</span
    >
  </button>
</div>
