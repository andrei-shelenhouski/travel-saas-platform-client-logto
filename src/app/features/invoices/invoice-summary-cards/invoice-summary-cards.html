<div class="summary-cards-grid">
  <button
    aria-label="Фильтр по черновикам счетов"
    class="summary-card"
    type="button"
    [class.summary-card--active]="isDraftActive()"
    (click)="onDraftClick()"
  >
    <div class="summary-card-header">
      <span aria-hidden="true" class="material-icons summary-card-icon">edit_note</span>
      <span class="summary-card-label">Черновики</span>
    </div>
    <p class="summary-card-count">{{ drafts() }}</p>
    <p class="summary-card-hint">Нажмите для фильтрации</p>
  </button>

  <button
    aria-label="Фильтр по счетам в ожидании оплаты"
    class="summary-card"
    type="button"
    [class.summary-card--active]="isPendingActive()"
    (click)="onPendingClick()"
  >
    <div class="summary-card-header">
      <span aria-hidden="true" class="material-icons summary-card-icon">schedule</span>
      <span class="summary-card-label">Ожидают оплаты</span>
    </div>
    <p class="summary-card-count">{{ pendingCount() }}</p>
    <p class="summary-card-hint">
      <span>Сумма:</span>
      {{ formatAmount(pendingAmount()) }} {{ currency() }}
    </p>
  </button>

  <button
    aria-label="Фильтр по просроченным счетам"
    class="summary-card"
    type="button"
    [class.summary-card--active]="isOverdueActive()"
    (click)="onOverdueClick()"
  >
    <div class="summary-card-header">
      <span aria-hidden="true" class="material-icons summary-card-icon">warning</span>
      <span class="summary-card-label">Просрочено</span>
    </div>
    <p class="summary-card-count">{{ overdueCount() }}</p>
    <p class="summary-card-hint">
      <span>Сумма:</span>
      {{ formatAmount(overdueAmount()) }} {{ currency() }}
    </p>
  </button>
</div>
