<div class="filter-bar-grid">
  <mat-form-field subscriptSizing="dynamic">
    <mat-label>Статусы</mat-label>
    <mat-select
      multiple
      [value]="statusFilter()"
      (selectionChange)="onStatusSelectionChange($event.value)"
    >
      @for (status of statusOptions; track status.value) {
        <mat-option [value]="status.value">{{ status.label }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <mat-form-field subscriptSizing="dynamic">
    <mat-label>Тип клиента</mat-label>
    <mat-select
      [value]="clientTypeFilter()"
      (selectionChange)="onClientTypeSelectionChange($event.value)"
    >
      <mat-option value="">Все</mat-option>
      @for (type of clientTypeOptions; track type.value) {
        <mat-option [value]="type.value">{{ type.label }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <mat-form-field subscriptSizing="dynamic">
    <mat-label>Дата счета с</mat-label>
    <input
      matInput
      type="date"
      [value]="dateFromFilter()"
      (change)="onDateFromInputChange($any($event.target).value)"
    />
  </mat-form-field>

  <mat-form-field subscriptSizing="dynamic">
    <mat-label>Дата счета по</mat-label>
    <input
      matInput
      type="date"
      [value]="dateToFilter()"
      (change)="onDateToInputChange($any($event.target).value)"
    />
  </mat-form-field>

  <mat-form-field subscriptSizing="dynamic">
    <mat-label>Валюта</mat-label>
    <input
      matInput
      placeholder="BYN"
      [value]="currencyFilter()"
      (change)="onCurrencyInputChange($any($event.target).value)"
    />
  </mat-form-field>

  <mat-form-field subscriptSizing="dynamic">
    <mat-label>Поиск</mat-label>
    <input matInput placeholder="Номер счета или имя клиента" [formControl]="searchControl()" />
  </mat-form-field>
</div>
