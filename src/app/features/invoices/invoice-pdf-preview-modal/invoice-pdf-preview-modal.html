<h2 class="pdf-dialog-title" mat-dialog-title>
  <span class="pdf-dialog-title-text">Счёт №{{ data.invoiceNumber }}</span>
  <div class="pdf-dialog-title-actions">
    <button
      mat-stroked-button
      type="button"
      [disabled]="loading() || !!error()"
      (click)="downloadPdf()"
    >
      Скачать PDF
    </button>
    <button
      aria-label="Закрыть предпросмотр PDF"
      mat-icon-button
      type="button"
      (click)="close()"
    >
      <mat-icon>close</mat-icon>
    </button>
  </div>
</h2>

<mat-dialog-content>
  <div class="pdf-container">
    @if (loading()) {
      <div aria-live="polite" class="pdf-state" role="status">
        <div aria-hidden="true" class="pdf-spinner"></div>
      </div>
    } @else if (error()) {
      <div aria-live="assertive" class="pdf-state pdf-error" role="alert">
        <span>{{ errorMessage() }}</span>
        <button
          class="pdf-error-retry"
          mat-stroked-button
          type="button"
          (click)="retry()"
        >
          Попробуйте ещё раз
        </button>
      </div>
    } @else if (pdfUrl(); as currentPdfUrl) {
      <div class="pdf-a4-frame">
        <iframe
          class="pdf-iframe"
          title="Предпросмотр PDF счёта"
          [src]="currentPdfUrl"
        ></iframe>
      </div>
    }
  </div>
</mat-dialog-content>
