<app-page-heading
  subtitle="Всего: {{ totalElements() }} счетов"
  title="Счета"
>
  @if (canCreateInvoice()) {
    <button appPageAction color="primary" icon="add" label="Создать счёт" mat-flat-button type="button" (click)="navigateToCreateInvoice()">
      <mat-icon>add</mat-icon>
      <span>Новый счет</span>
    </button>
  }
</app-page-heading>

<div class="invoices-list-content">
  <app-invoice-summary-cards
    [currency]="summary().currency"
    [drafts]="summary().drafts"
    [overdueAmount]="summary().overdueAmount"
    [overdueCount]="summary().overdueCount"
    [pendingAmount]="summary().pendingAmount"
    [pendingCount]="summary().pendingCount"
    [selectedStatuses]="statusFilter()"
    (statusesSelect)="onSummaryPresetSelect($event)"
  />

  <app-invoice-filter-bar
    [clientTypeFilter]="clientTypeFilter()"
    [currencyFilter]="currencyFilter()"
    [dateFromFilter]="dateFromFilter()"
    [dateToFilter]="dateToFilter()"
    [searchControl]="searchControl"
    [statusFilter]="statusFilter()"
    (clientTypeFilterChange)="onClientTypeFilterChange($event)"
    (currencyFilterChange)="onCurrencyFilterChange($event)"
    (dateFromChange)="onDateFromChange($event)"
    (dateToChange)="onDateToChange($event)"
    (statusFilterChange)="onStatusFilterChange($event)"
  />

  @if (error()) {
    <p class="invoices-list-error" role="alert">{{ error() }}</p>
  }

  <app-invoices-table [invoices]="invoices()" [loading]="loading()" />

  @if (totalElements() > pageSize) {
    <mat-paginator
      aria-label="Пагинация счетов"
      [length]="totalElements()"
      [pageIndex]="currentPage()"
      [pageSize]="pageSize"
      [showFirstLastButtons]="true"
      (page)="onPageChange($event)"
    />
  }
</div>
