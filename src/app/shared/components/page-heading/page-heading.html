<div class="title-and-type">
  @if (showBackButton()) {
    <button
      aria-label="Go back to previous page"
      i18n-aria-label="@@pageHeadingBackLinkAria"
      matIconButton
      type="button"
      (click)="goBack()"
    >
      <mat-icon>arrow_back</mat-icon>
    </button>
  }

  <div class="title-and-type__content">
    @if (title(); as title) {
      <h1 class="text-xl font-semibold">{{ title }}</h1>
    }

    @if (subtitle(); as subtitle) {
      <p class="mt-1 text-sm">{{ subtitle }}</p>
    }
  </div>
</div>

<div class="actions">
  <ng-content></ng-content>
</div>
