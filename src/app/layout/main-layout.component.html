<div class="flex h-screen bg-gray-50">
  <aside class="w-56 flex flex-col border-r border-gray-200 bg-white">
    <nav class="flex flex-1 flex-col gap-1 p-3">
      <a
        routerLink="/app/dashboard"
        routerLinkActive="bg-primary-muted text-primary-700"
        class="flex items-center gap-2 rounded px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100"
        i18n
        ><i class="pi pi-home"></i>Dashboard</a
      >
      <a
        routerLink="/app/leads"
        routerLinkActive="bg-primary-muted text-primary-700"
        class="flex items-center gap-2 rounded px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100"
        i18n
        ><i class="pi pi-bolt"></i>Leads</a
      >
      <a
        routerLink="/app/clients"
        routerLinkActive="bg-primary-muted text-primary-700"
        class="flex items-center gap-2 rounded px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100"
        i18n
        ><i class="pi pi-users"></i>Clients</a
      >
      <a
        routerLink="/app/requests"
        routerLinkActive="bg-primary-muted text-primary-700"
        class="flex items-center gap-2 rounded px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100"
        i18n
        ><i class="pi pi-inbox"></i>Requests</a
      >
      <a
        routerLink="/app/offers"
        routerLinkActive="bg-primary-muted text-primary-700"
        class="flex items-center gap-2 rounded px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100"
        i18n
        ><i class="pi pi-send"></i>Offers</a
      >
      <a
        routerLink="/app/bookings"
        routerLinkActive="bg-primary-muted text-primary-700"
        class="flex items-center gap-2 rounded px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100"
        i18n
        ><i class="pi pi-calendar"></i>Bookings</a
      >
      <a
        routerLink="/app/invoices"
        routerLinkActive="bg-primary-muted text-primary-700"
        class="flex items-center gap-2 rounded px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100"
        i18n
        ><i class="pi pi-file"></i>Invoices</a
      >
      @if (permissions.isAdmin()) {
        <a
          routerLink="/app/admin/users"
          routerLinkActive="bg-primary-muted text-primary-700"
          class="mt-4 flex items-center gap-2 rounded px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100"
          i18n
          ><i class="pi pi-users"></i>User management</a
        >
      }
      <a
        routerLink="/app/settings"
        routerLinkActive="bg-primary-muted text-primary-700"
        class="mt-4 flex items-center gap-2 rounded px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100"
        i18n
        ><i class="pi pi-cog"></i>Settings</a
      >
    </nav>
  </aside>
  <div class="flex flex-1 flex-col min-w-0">
    <header class="flex h-14 items-center justify-between border-b border-gray-200 bg-white px-4">
      <span class="text-sm font-medium text-gray-700">{{ activeOrgName }}</span>
      <div class="flex items-center gap-3">
        @if (userPicture) {
          <img
            [src]="userPicture"
            [alt]="userDisplay"
            class="h-9 w-9 rounded-full object-cover ring-2 ring-gray-200"
          />
        } @else {
          <div
            class="flex h-9 w-9 items-center justify-center rounded-full bg-primary-100 text-sm font-medium text-primary ring-2 ring-gray-200"
          >
            {{ userInitial }}
          </div>
        }
        <span class="text-sm text-gray-600">{{ userDisplay }}</span>
        <span
          class="rounded-full px-2.5 py-0.5 text-xs font-medium"
          [class]="
            permissions.roleLabel() === 'Admin'
              ? 'bg-violet-100 text-violet-800'
              : permissions.roleLabel() === 'Agent'
                ? 'bg-amber-100 text-amber-800'
                : 'bg-sky-100 text-sky-800'
          "
        >
          {{ permissions.roleLabel() }}
        </span>
        <button
          type="button"
          (click)="logout()"
          class="flex items-center gap-2 rounded px-3 py-1.5 text-sm font-medium text-gray-700 hover:bg-gray-100"
          i18n
        >
          <i class="pi pi-sign-out"></i>Logout
        </button>
      </div>
    </header>
    <main class="flex-1 overflow-auto p-4">
      <router-outlet />
    </main>
  </div>
  <app-toast />
</div>
